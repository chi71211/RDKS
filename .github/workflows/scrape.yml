name: 自動化 RDKS 爬蟲

# 設定排程時間
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 加入超時設定，雖然 GitHub 上限是 360 分鐘，我們設定 350 分鐘讓它有充裕時間打包
    timeout-minutes: 350 
    
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: |
          pip install requests pandas openpyxl urllib3

      - name: 執行爬蟲腳本
        run: python ES.py # 執行您的 Python 檔案

      # 🌟 關鍵救命符：if: always() 確保就算超時或取消，也會執行上傳！
      - name: 上傳爬取結果 (Excel 與 SQLite 資料庫)
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: RDKS
          path: |
            RDKS/
            RDKS.db
            RDKS.sql
